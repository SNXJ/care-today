server:
  port: ${PORT:3000}

spring:
  application:
    name: care-today-backend
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/care_today?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DATABASE_USER:care_today}
    password: ${DATABASE_PASSWORD:care_today_password}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${MAX_APK_SIZE:300MB}
      max-request-size: ${MAX_APK_SIZE:300MB}

management:
  endpoints:
    web:
      exposure:
        include: health

care-today:
  jwt-secret: ${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-domain.example,http://localhost:5173,http://localhost:8080,https://localhost:8443}
  medical-boundary: "CareToday only supports life companionship, appointment organization, and family collaboration. It does not provide diagnosis, treatment advice, or medication judgment."
  # App 发布管理：白名单账号（邮箱/手机号，逗号分隔）可上传 APK；release-dir 存放 APK 与 releases.json
  admin-accounts: ${ADMIN_ACCOUNTS:}
  release-dir: ${APP_RELEASE_DIR:./data/releases}
  apk-base-url: ${APK_BASE_URL:https://your-domain.example/apk}
