services:
  mysql:
    image: mysql:8.4
    container_name: care-today-mysql
    environment:
      MYSQL_DATABASE: care_today
      MYSQL_USER: care_today
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - care_today_mysql:/var/lib/mysql

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: care-today-backend
    working_dir: /app
    command: sh -c "mvn clean package -DskipTests && java -jar target/care-today-backend-0.1.0.jar"
    environment:
      PORT: 3000
      DATABASE_URL: jdbc:mysql://mysql:3306/care_today?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DATABASE_USER: care_today
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      FLYWAY_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://your-domain.example,http://localhost:5173,http://localhost:8080,https://localhost:8443}
      APP_RELEASE_DIR: /data/releases
      ADMIN_ACCOUNTS: ${ADMIN_ACCOUNTS:-}
      APK_BASE_URL: ${APK_BASE_URL:-https://your-domain.example/apk}
      MAX_APK_SIZE: ${MAX_APK_SIZE:-300MB}
    volumes:
      - ../backend:/app
      - care_today_apk:/data/releases
    ports:
      - "3000:3000"
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: care-today-nginx
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - care_today_apk:/usr/share/nginx/apk:ro
      - ./apk-admin:/usr/share/nginx/manage:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - backend

volumes:
  care_today_mysql:
  care_today_apk:
