services:
  postgres:
    image: postgres:16-alpine
    container_name: care-today-postgres
    environment:
      POSTGRES_DB: care_today
      POSTGRES_USER: care_today
      POSTGRES_PASSWORD: care_today_password
    volumes:
      - care_today_postgres:/var/lib/postgresql/data
      - ../backend/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "5432:5432"

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: care-today-backend
    working_dir: /app
    command: sh -c "mvn clean package -DskipTests && java -jar target/care-today-backend-0.1.0.jar"
    environment:
      PORT: 3000
      DATABASE_URL: jdbc:postgresql://postgres:5432/care_today
      DATABASE_USER: care_today
      DATABASE_PASSWORD: care_today_password
      FLYWAY_ENABLED: "true"
      JWT_SECRET: replace-with-a-long-random-secret
    volumes:
      - ../backend:/app
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    container_name: care-today-nginx
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  care_today_postgres:
