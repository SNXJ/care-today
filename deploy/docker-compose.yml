services:
  mysql:
    image: mysql:8.4
    container_name: care-today-mysql
    environment:
      MYSQL_DATABASE: care_today
      MYSQL_USER: care_today
      MYSQL_PASSWORD: care_today_password
      MYSQL_ROOT_PASSWORD: care_today_root_password
    volumes:
      - care_today_mysql:/var/lib/mysql

  backend:
    image: maven:3.9-eclipse-temurin-17
    container_name: care-today-backend
    working_dir: /app
    command: sh -c "mvn clean package -DskipTests && java -jar target/care-today-backend-0.1.0.jar"
    environment:
      PORT: 3000
      DATABASE_URL: jdbc:mysql://mysql:3306/care_today?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DATABASE_USER: care_today
      DATABASE_PASSWORD: care_today_password
      FLYWAY_ENABLED: "true"
      JWT_SECRET: replace-with-a-long-random-secret
    volumes:
      - ../backend:/app
    ports:
      - "3000:3000"
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: care-today-nginx
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  care_today_mysql:
