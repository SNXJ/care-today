<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareToday 发布管理</title>
  <style>
    :root {
      --paper: #fbf8f4; --panel: #fffdf9; --ink: #2e2a27; --muted: #766b62;
      --line: #eadfd3; --rose: #b85f55; --sage: #78927c; --amber: #c8893f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--paper); color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      padding: 24px; line-height: 1.6;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-family: Georgia, serif; font-size: 28px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 16px; padding: 20px; margin-bottom: 18px;
    }
    .card h2 { font-size: 17px; margin: 0 0 14px; }
    label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
    input[type=text], input[type=password], input[type=number], textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line);
      border-radius: 10px; font: inherit; background: #fff;
    }
    textarea { min-height: 64px; resize: vertical; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    .check { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .check input { width: auto; }
    button {
      border: none; border-radius: 10px; padding: 10px 18px; font: inherit;
      font-weight: 600; cursor: pointer; background: var(--sage); color: #fff;
      margin-top: 14px;
    }
    button.ghost { background: transparent; color: var(--rose); border: 1px solid var(--line); }
    button.danger { background: transparent; color: var(--rose); border: 1px solid var(--rose); margin: 0; padding: 6px 12px; }
    button:disabled { opacity: .5; cursor: default; }
    .hidden { display: none; }
    .msg { font-size: 13px; margin-top: 10px; }
    .msg.err { color: var(--rose); }
    .msg.ok { color: var(--sage); }
    .ver { border-top: 1px solid var(--line); padding: 12px 0; display: flex; align-items: center; gap: 12px; }
    .ver:first-child { border-top: none; }
    .ver .grow { flex: 1; }
    .ver strong { display: block; }
    .ver small { color: var(--muted); }
    .badge { font-size: 11px; background: #fdeee2; color: var(--amber); padding: 2px 8px; border-radius: 20px; }
    .who { float: right; font-size: 13px; color: var(--muted); }
    .progress { height: 6px; background: var(--line); border-radius: 6px; overflow: hidden; margin-top: 10px; }
    .progress > span { display: block; height: 100%; width: 0; background: var(--sage); transition: width .2s; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CareToday 发布管理</h1>
    <p class="sub">上传 Android APK、管理版本号；客户端会自动检查更新。<span class="who" id="who"></span></p>

    <section class="card" id="loginCard">
      <h2>管理员登录</h2>
      <label>手机号或邮箱</label>
      <input type="text" id="account" autocomplete="username" />
      <label>密码</label>
      <input type="password" id="password" autocomplete="current-password" />
      <button id="loginBtn">登录</button>
      <div class="msg" id="loginMsg"></div>
    </section>

    <section class="card hidden" id="uploadCard">
      <h2>上传新版本</h2>
      <div class="row">
        <div>
          <label>versionName（如 1.0.1）</label>
          <input type="text" id="versionName" placeholder="1.0.1" />
        </div>
        <div>
          <label>versionCode（整数，须比上一个大）</label>
          <input type="number" id="versionCode" placeholder="4" />
        </div>
      </div>
      <label>更新说明</label>
      <textarea id="notes" placeholder="本次更新内容…"></textarea>
      <div class="check">
        <input type="checkbox" id="forceUpdate" />
        <label for="forceUpdate" style="margin:0;color:var(--ink)">强制更新（不更新无法继续使用）</label>
      </div>
      <label>APK 文件</label>
      <input type="file" id="file" accept=".apk" />
      <div class="progress hidden" id="prog"><span></span></div>
      <button id="uploadBtn">上传发布</button>
      <button class="ghost" id="logoutBtn">退出登录</button>
      <div class="msg" id="uploadMsg"></div>
    </section>

    <section class="card hidden" id="listCard">
      <h2>历史版本</h2>
      <div id="versions"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
