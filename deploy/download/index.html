<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陪你一起过今天 · 下载</title>
  <style>
    :root {
      --paper: #fbf8f4; --panel: #fffdf9; --ink: #2e2a27; --muted: #766b62;
      --line: #eadfd3; --rose: #b85f55; --sage: #78927c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(180deg, #fff6ed 0%, #f6ddd0 100%);
      color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 26px; padding: 32px 26px; max-width: 380px; width: 100%;
      text-align: center; box-shadow: 0 12px 40px rgba(160,110,90,.12);
    }
    .logo { width: 92px; height: 92px; border-radius: 22px; box-shadow: 0 6px 18px rgba(160,110,90,.2); }
    h1 { font-family: Georgia, "Songti SC", serif; font-size: 26px; margin: 16px 0 4px; }
    .tag { color: var(--muted); font-size: 14px; margin: 0 0 18px; line-height: 1.6; }
    .ver { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .notes {
      background: #fff7ee; border: 1px solid var(--line); border-radius: 14px;
      padding: 12px 14px; font-size: 13px; color: var(--ink); text-align: left;
      white-space: pre-wrap; margin: 14px 0; line-height: 1.6; display: none;
    }
    .btn {
      display: block; width: 100%; padding: 14px; border: none; border-radius: 14px;
      background: var(--rose); color: #fff; font-size: 16px; font-weight: 700;
      text-decoration: none; margin-top: 10px; cursor: pointer;
    }
    .btn.disabled { background: #d9cabb; pointer-events: none; }
    .qr-wrap { margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--line); }
    .qr-wrap img { width: 150px; height: 150px; }
    .qr-wrap p { font-size: 13px; color: var(--muted); margin: 8px 0 0; }
    .ios { font-size: 12px; color: var(--muted); margin-top: 14px; line-height: 1.6; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="应用图标" />
    <h1>陪你一起过今天</h1>
    <p class="tag">把今天需要记住的事，<br>放在一个温柔而清楚的地方。</p>

    <div class="ver" id="ver">正在获取最新版本…</div>
    <div class="notes" id="notes"></div>

    <a class="btn disabled" id="dlBtn" href="#">暂未发布</a>
    <p class="hint" id="hint"></p>

    <div class="qr-wrap">
      <img src="qr.png" alt="下载二维码" />
      <p>用手机扫码打开本页下载</p>
    </div>

    <p class="ios">Android 直接点击上方按钮下载安装。<br>iPhone / iPad 暂未上架，敬请期待。</p>
  </div>

  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var isAndroid = /Android/i.test(ua);
      var isiOS = /iPhone|iPad|iPod/i.test(ua);
      function fmtSize(b) { return b ? (b / 1048576).toFixed(1) + ' MB' : ''; }

      fetch('/api/app/version').then(function (r) {
        if (r.status === 204) throw new Error('empty');
        if (!r.ok) throw new Error('http ' + r.status);
        return r.json();
      }).then(function (v) {
        document.getElementById('ver').textContent =
          '最新版本 v' + v.versionName + (v.fileSize ? ' · ' + fmtSize(v.fileSize) : '');
        if (v.notes) {
          var n = document.getElementById('notes');
          n.textContent = v.notes;
          n.style.display = 'block';
        }
        var btn = document.getElementById('dlBtn');
        btn.href = v.apkUrl;
        btn.classList.remove('disabled');
        btn.textContent = '下载 APK（Android）';
        var hint = document.getElementById('hint');
        if (isiOS) hint.textContent = '检测到 iOS 设备，暂无法安装 APK。';
        else if (!isAndroid) hint.textContent = '请在 Android 手机上打开本页下载。';
      }).catch(function () {
        document.getElementById('ver').textContent = '还没有发布版本，请稍后再来。';
      });
    })();
  </script>
</body>
</html>
