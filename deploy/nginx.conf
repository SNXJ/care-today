server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; base-uri 'self'; frame-ancestors 'none'" always;

  location /api/ {
    client_max_body_size 300m;
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # APK 下载与版本清单（由后端写入的共享卷静态分发）
  location /apk/ {
    alias /usr/share/nginx/apk/;
    types { application/vnd.android.package-archive apk; application/json json; }
    default_type application/octet-stream;
    autoindex off;
  }

  # 发布管理页（静态）
  location /manage/ {
    alias /usr/share/nginx/manage/;
    index index.html;
    try_files $uri $uri/ /manage/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/certs/localhost.crt;
  ssl_certificate_key /etc/nginx/certs/localhost.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  root /usr/share/nginx/html;
  index index.html;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; base-uri 'self'; frame-ancestors 'none'" always;

  location /api/ {
    client_max_body_size 300m;
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # APK 下载与版本清单（由后端写入的共享卷静态分发）
  location /apk/ {
    alias /usr/share/nginx/apk/;
    types { application/vnd.android.package-archive apk; application/json json; }
    default_type application/octet-stream;
    autoindex off;
  }

  # 发布管理页（静态）
  location /manage/ {
    alias /usr/share/nginx/manage/;
    index index.html;
    try_files $uri $uri/ /manage/index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
